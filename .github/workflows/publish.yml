name: Build Executables

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller rich beautifulsoup4

      - name: Build executable
        run: |
          pyinstaller html-cleaner.spec
          if not exist "dist\html-cleaner\html-cleaner.exe" exit /b 1
          powershell -Command "Compress-Archive -Path 'dist\html-cleaner' -DestinationPath 'html-cleaner-win64.zip' -Force"
        shell: cmd

      - name: Check build artifacts
        run: |
          echo "Checking for build artifacts..."
          if (Test-Path "dist/html-cleaner/html-cleaner.exe") {
            echo "✓ Executable found"
          } else {
            echo "✗ Executable NOT found"
            exit 1
          }
          if (Test-Path "html-cleaner-win64.zip") {
            echo "✓ ZIP archive found"
          } else {
            echo "✗ ZIP archive NOT found"
            exit 1
          }
        shell: powershell

      - name: Upload artifacts to release
        run: |
          # Create release from tag if it doesn't exist
          gh release create ${{ github.ref_name }} --generate-notes 2>/dev/null || true
          # Upload artifacts to release
          gh release upload ${{ github.ref_name }} dist/html-cleaner/html-cleaner.exe html-cleaner-win64.zip --clobber
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
