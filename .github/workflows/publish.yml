name: Build Executables

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller rich beautifulsoup4

      - name: Build executable
        run: |
          pyinstaller html-cleaner.spec
          powershell -Command "Compress-Archive -Path 'dist\html-cleaner' -DestinationPath 'html-cleaner-win64.zip' -Force"
        shell: powershell

      - name: Upload artifacts to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/html-cleaner/html-cleaner.exe html-cleaner-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
