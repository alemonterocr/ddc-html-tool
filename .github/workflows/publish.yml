name: Build Executables

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller rich beautifulsoup4

      - name: Build executable
        run: |
          pyinstaller html-cleaner.spec
          Compress-Archive -Path "dist\html-cleaner" -DestinationPath "html-cleaner-win64.zip"
        shell: powershell

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./html-cleaner-win64.zip
          asset_name: html-cleaner-win64.zip
          asset_content_type: application/zip

      - name: Upload executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/html-cleaner/html-cleaner.exe
          asset_name: html-cleaner.exe
          asset_content_type: application/octet-stream
